site_name: SAHD
site_description: >-
    Semantics of Ancient Hebrew Database
site_url: 'https://pthu.github.io/sahd/'
site_author: Vesa Åkerman

nav:
    - Home: index.md
    - Lemmas:
    - Semantic fields:
    - News: 'store/news.md'
    - Contributors:
    - Editorial board:
    - Printed publications: 'store/printed_publications.md'
    - Miscellaneous:
    - Partners: 'store/partners.md'
    - Contribution: 'store/contribution.md'
    - Contact: 'store/contact.md'
    - Abbreviations: 'store/abbreviations.md'

theme:
    name: material
    palette:
        - scheme: default
          primary: black
          accent: deep orange
          toggle:
              icon: material/weather-night
              name: Switch to dark mode
        - scheme: slate
          primary: black
          accent: deep orange
          toggle:
              icon: material/weather-sunny
              name: Switch to light mode
    custom_dir: overrides

markdown_extensions:
    - attr_list
    - footnotes
    - md_in_html

extra_css:
   - static/stylesheets/extra.css

extra_javascript:
    - static/javascripts/extra.js
    - static/javascripts/goatcounter.js


